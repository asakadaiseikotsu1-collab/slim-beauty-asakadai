<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約受付完了｜スリムビューティ朝霞台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#FFF9F0;color:#1A1510;font-family:'Noto Sans JP',sans-serif;min-height:100svh;display:flex;flex-direction:column;}
:root{--orange:#D4380D;--gold:#D4A017;--gold2:#F5C842;--gold-pale:#FEF8E0;--green:#2E9E6B;--bg:#FFF9F0;--white:#FFFFFF;--muted:#666;--border:#EEE0CC;--r:10px;}
.wrap{max-width:480px;margin:0 auto;padding:0 16px;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:48px;padding-bottom:64px;}
.icon-wrap{position:relative;margin-bottom:28px;}
.icon-circle{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:36px;animation:popIn .6s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(212,160,23,.3);animation:ringOut .8s .2s ease both;}
@keyframes ringOut{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.title{font-family:'Shippori Mincho',serif;font-size:clamp(22px,6vw,28px);font-weight:800;line-height:1.5;margin-bottom:10px;animation:fadeUp .6s .2s ease both;}
.title em{font-style:normal;color:var(--orange);}
.sub{font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:32px;animation:fadeUp .6s .3s ease both;}
.card{background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);padding:20px;width:100%;text-align:left;margin-bottom:16px;animation:fadeUp .6s .35s ease both;}
.card-title{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.1em;margin-bottom:12px;}
.card-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.75;margin-bottom:9px;}
.card-item:last-child{margin-bottom:0;}
.card-item::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;margin-top:1px;}
.btn-line{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#06C755;color:#fff;font-size:15px;font-weight:700;padding:16px;border-radius:var(--r);text-decoration:none;margin-bottom:10px;animation:fadeUp .6s .4s ease both;}
.btn-top{display:flex;align-items:center;justify-content:center;width:100%;background:var(--white);border:1.5px solid var(--border);color:var(--muted);font-size:13px;font-weight:700;padding:14px;border-radius:var(--r);text-decoration:none;animation:fadeUp .6s .45s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
footer{background:#1A1510;color:rgba(255,255,255,.35);padding:16px;text-align:center;font-size:10px;line-height:2;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon-wrap">
    <div class="ring"></div>
    <div class="icon-circle">✓</div>
  </div>

  <h1 class="title">
    ご予約を<br>
    <em>受け付けました</em>
  </h1>
  <p class="sub">
    ご入力のメールアドレスに<br>
    確認メールをお送りしました。<br>
    <br>
    担当スタッフより<strong>1営業日以内</strong>に<br>
    ご連絡いたします。
  </p>

  <div class="card">
    <div class="card-title">ご来院前のご確認</div>
    <div class="card-item">普段着でお越しください。お着替えは不要です</div>
    <div class="card-item">当日の契約・申し込みは一切不要です</div>
    <div class="card-item">キャンセルはLINEまたはメールにてご連絡ください</div>
    <div class="card-item">朝霞台駅南口より徒歩1分です</div>
  </div>

  <a href="https://line.me/R/ti/p/%40YOUR_LINE_ID" class="btn-line">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.03 2 11c0 2.7 1.28 5.12 3.31 6.79L4.5 21.5l3.9-1.95C9.53 19.83 10.74 20 12 20c5.52 0 10-4.03 10-9s-4.48-9-10-9z"/></svg>
    LINEでもご連絡いただけます
  </a>
  <a href="./index.html" class="btn-top">← トップページに戻る</a>
</div>

<footer>
  タケシフルカワ整骨院 ／ 埼玉県朝霞市 朝霞台駅南口徒歩1分<br>
  © 2024 スリムビューティ朝霞台 All Rights Reserved.
</footer>
</body>
</html>
